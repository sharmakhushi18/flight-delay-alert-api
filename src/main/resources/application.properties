# Default profile
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
spring.application.name=flight-delay-alert-api

# --- LOCAL DEVELOPMENT (MySQL - Laptop ke liye) ---
%dev.spring.datasource.url=jdbc:mysql://localhost:3306/flightdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
%dev.spring.datasource.username=root
%dev.spring.datasource.password=root123

# --- PRODUCTION (PostgreSQL - Render ke liye) ---
%prod.spring.datasource.url=${DB_URL}
%prod.spring.datasource.username=${DB_USERNAME}
%prod.spring.datasource.password=${DB_PASSWORD}

# Common Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
server.port=${PORT:8080}

# Mail Settings (Fully Protected)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

spring.jackson.serialization.FAIL_ON_EMPTY_BEANS=false