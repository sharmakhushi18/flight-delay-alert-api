spring.application.name=flight-delay-alert-api
# This ensures it defaults to dev but Render can override it
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# --- COMMON SETTINGS ---
spring.jpa.hibernate.ddl-auto=update
spring.jackson.serialization.FAIL_ON_EMPTY_BEANS=false
server.port=${PORT:8080}

# --- LOCAL DEV (MySQL) ---
%dev.spring.datasource.url=jdbc:mysql://localhost:3306/flightdb
%dev.spring.datasource.username=root
%dev.spring.datasource.password=root123

# --- PRODUCTION (PostgreSQL) ---
%prod.spring.datasource.url=${SPRING_DATASOURCE_URL}
%prod.spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
%prod.spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
# This speeds up Hibernate on Render
%prod.spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false

# --- MAIL ---
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true