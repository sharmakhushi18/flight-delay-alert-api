# Default profile is 'dev' for local work
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
spring.application.name=flight-delay-alert-api

# Local MySQL Settings
spring.datasource.url=jdbc:mysql://localhost:3306/flightdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=YourLocalPasswordHere
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate for MySQL
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Port
server.port=8080

# Mail (Use Env Variables for security)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

spring.jackson.serialization.FAIL_ON_EMPTY_BEANS=false