# 1. Profile & Application Name
# Defaults to 'dev' for local use, overridden by 'prod' on Render
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
spring.application.name=flight-delay-alert-api

# ---------------------------------------------------------
# 2. LOCAL DEVELOPMENT (MySQL - Your Laptop)
# ---------------------------------------------------------
%dev.spring.datasource.url=jdbc:mysql://localhost:3306/flightdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
%dev.spring.datasource.username=root
%dev.spring.datasource.password=root123
%dev.spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
%dev.spring.jpa.hibernate.ddl-auto=update

# ---------------------------------------------------------
# 3. PRODUCTION (Render - PostgreSQL)
# ---------------------------------------------------------
# IMPORTANT: Do NOT specify driver-class-name here.
# Spring Boot will auto-detect PostgreSQL from the URL.
%prod.spring.datasource.url=${SPRING_DATASOURCE_URL}
%prod.spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
%prod.spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# Optimization to speed up startup and prevent Render timeouts
%prod.spring.jpa.hibernate.ddl-auto=update
%prod.spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false
%prod.spring.jpa.show-sql=false

# ---------------------------------------------------------
# 4. COMMON SETTINGS (Port Binding)
# ---------------------------------------------------------
# Render provides a dynamic PORT. This line captures it.
server.port=${PORT:8080}

# 5. MAIL SETTINGS (Protected using Environment Variables)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Miscellaneous
spring.jackson.serialization.FAIL_ON_EMPTY_BEANS=false
